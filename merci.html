<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Message envoyé — Louis Coulongeon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/base.css" />
  <style>
    .thanks {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
      text-align: center;
    }
    .thanks-card {
      max-width: 32rem;
      padding: 2.5rem 2rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.72), rgba(15, 23, 42, 0.88));
      box-shadow: var(--shadow-soft);
    }
    .thanks-check {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #020617;
      background: linear-gradient(135deg, var(--color-secondary), var(--color-primary));
    }
    .thanks-check svg { width: 32px; height: 32px; }
    .thanks h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 800;
    }
    .thanks p {
      margin: 0 0 1.5rem;
      color: var(--color-text-muted);
    }
    .button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-fast);
    }
    .button-primary {
      color: #020617;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    }
    .button-primary:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <main class="thanks">
    <div class="thanks-card">
      <div class="thanks-check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1>Message envoyé, merci !</h1>
      <p>
        Votre message a bien été transmis à Louis. Si c'est votre tout premier
        envoi, un email d'activation peut avoir été envoyé pour confirmer
        l'adresse de réception. Louis vous répondra dès que possible.
      </p>
      <a class="button button-primary" href="./index.html#contact">Retour au portfolio</a>
    </div>
  </main>
</body>
</html>
